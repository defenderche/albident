name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint + Type-check + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AGENTS.md в синхроне с CLAUDE.md
        run: diff CLAUDE.md AGENTS.md
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
